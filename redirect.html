<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phantom Learning</title>
    <meta name="robots" content="noindex" />
    <style>
      html, body { margin: 0; padding: 0; background: #020617; }
    </style>
    <script>
      (function() {
        var SHEET_LOG_URL = "https://script.google.com/macros/s/AKfycby6_m3rACb-ij0eTKxLncBcnkG45RWQkUUp9WQ271CZxAwOwDI_6IhPfYiLJMNbB0u8/exec";
        var email = "", name = "";
        try {
          localStorage.setItem("phantom-from-redirect", "1");
          var hash = location.hash && location.hash.slice(1);
          if (hash) {
            var params = new URLSearchParams(hash);
            var idToken = params.get("id_token");
            if (idToken) {
              try {
                var payload = idToken.split(".")[1];
                if (payload) {
                  var json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
                  var data = JSON.parse(json);
                  if (data.email) {
                    email = String(data.email).trim();
                    localStorage.setItem("phantom-user-email", email);
                  }
                  if (data.name) { name = data.name; localStorage.setItem("phantom-user-name", data.name); }
                }
              } catch (e) {}
            }
          }
        } catch (e) {}

        var scriptPath = location.pathname.replace(/\/[^/]*$/, "/") + "blocked-emails.js?v=" + Date.now();
        var s = document.createElement("script");
        s.src = scriptPath;
        s.onload = s.onerror = function() {
          var blocked = typeof window.isEmailBlocked === "function" && window.isEmailBlocked(email);
          var target = blocked ? "blocked.html" : "policy.html";
          if (location.pathname && location.pathname.indexOf("redirect") !== -1) {
            target = location.pathname.replace("redirect.html", target);
          }
          if (SHEET_LOG_URL && (email || name)) {
            try {
              navigator.sendBeacon(SHEET_LOG_URL, JSON.stringify({
                email: email,
                name: name,
                time: new Date().toISOString(),
                blocked: blocked
              }));
            } catch (e) {
              fetch(SHEET_LOG_URL, {
                method: "POST",
                body: JSON.stringify({ email: email, name: name, time: new Date().toISOString(), blocked: blocked }),
                headers: { "Content-Type": "application/json" },
                keepalive: true
              }).catch(function() {});
            }
          }
          location.replace(target);
        };
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body></body>
</html>
