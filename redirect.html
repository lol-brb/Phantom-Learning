<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <meta name="robots" content="noindex" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #111827 0, #020617 40%, #000 100%);
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .msg {
        font-size: 14px;
        color: #9ca3af;
      }
    </style>
    <script>
      (function() {
        try { localStorage.setItem("phantom-from-redirect", "1"); } catch (e) {}
        var target = "main.html";
        if (location.pathname && location.pathname.indexOf("redirect") !== -1) {
          target = location.pathname.replace("redirect.html", "main.html");
        }
        location.replace(target);
      })();
    </script>
  </head>
  <body>
    <div class="msg">Redirecting…</div>
  </body>
</html>
