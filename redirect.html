<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phantom Learning</title>
    <meta name="robots" content="noindex" />
    <style>
      html, body { margin: 0; padding: 0; background: #020617; }
    </style>
    <script>
      (function() {
        var SHEET_LOG_URL = "https://script.google.com/macros/s/AKfycbw-ffrNNCT4Ci8rMtrrFCEmVPUqKvWmSaIwuFR4nGo9v695xGfzeiBN81sIHe75HJ23tg/exec";
        var email = "", name = "";
        try {
          localStorage.setItem("phantom-from-redirect", "1");
          var hash = location.hash && location.hash.slice(1);
          if (hash) {
            var params = new URLSearchParams(hash);
            var idToken = params.get("id_token");
            if (idToken) {
              try {
                var payload = idToken.split(".")[1];
                if (payload) {
                  var json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
                  var data = JSON.parse(json);
                  if (data.email) {
                    email = String(data.email).trim();
                    localStorage.setItem("phantom-user-email", email);
                  }
                  if (data.name) { name = data.name; localStorage.setItem("phantom-user-name", data.name); }
                }
              } catch (e) {}
            }
          }
        } catch (e) {}

        var scriptPath = location.pathname.replace(/\/[^/]*$/, "/") + "blocked-emails.js?v=" + Date.now();
        var s = document.createElement("script");
        s.src = scriptPath;
        var done = false;
        var redirected = false;
        function go(target) {
          if (redirected) return;
          redirected = true;
          location.replace(target);
        }
        function runRedirect() {
          if (done) return;
          done = true;
          var blocked = typeof window.isEmailBlocked === "function" && window.isEmailBlocked(email);
          var target = blocked ? "blocked.html" : "policy.html";
          if (location.pathname && location.pathname.indexOf("redirect") !== -1) {
            target = location.pathname.replace("redirect.html", target);
          }
          if (SHEET_LOG_URL && (email || name)) {
            var time = new Date().toISOString();
            var q = "?email=" + encodeURIComponent(email) + "&name=" + encodeURIComponent(name) + "&time=" + encodeURIComponent(time);
            var img = new Image();
            img.src = SHEET_LOG_URL + q;
            setTimeout(function() { go(target); }, 600);
          } else {
            go(target);
          }
        }
        s.onload = s.onerror = runRedirect;
        setTimeout(runRedirect, 2500);
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body></body>
</html>
