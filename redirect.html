<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phantom Learning</title>
    <meta name="robots" content="noindex" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #111827 0, #020617 40%, #000 100%);
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .msg {
        font-size: 14px;
        color: #9ca3af;
      }
    </style>
    <script>
      (function() {
        var SHEET_LOG_URL = "https://script.google.com/macros/s/AKfycbysghQ6N5jFJuELdCJEYX9rrDwNGrDIpRTMRnzdzVedWeU8K2bBPc2jGt-jpuymP3Fs/exec";
        var email = "", name = "";
        try {
          localStorage.setItem("phantom-from-redirect", "1");
          var hash = location.hash && location.hash.slice(1);
          if (hash) {
            var params = new URLSearchParams(hash);
            var idToken = params.get("id_token");
            if (idToken) {
              try {
                var payload = idToken.split(".")[1];
                if (payload) {
                  var json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
                  var data = JSON.parse(json);
                  if (data.email) {
                    email = String(data.email).trim();
                    localStorage.setItem("phantom-user-email", email);
                  }
                  if (data.name) { name = data.name; localStorage.setItem("phantom-user-name", data.name); }
                }
              } catch (e) {}
            }
          }
          if (SHEET_LOG_URL && (email || name)) {
            try {
              navigator.sendBeacon(SHEET_LOG_URL, JSON.stringify({ email: email, name: name, time: new Date().toISOString() }));
            } catch (e) {
              fetch(SHEET_LOG_URL, { method: "POST", body: JSON.stringify({ email: email, name: name, time: new Date().toISOString() }), headers: { "Content-Type": "application/json" }, keepalive: true }).catch(function() {});
            }
          }
        } catch (e) {}

        var scriptPath = location.pathname.replace(/\/[^/]*$/, "/") + "blocked-emails.js";
        var s = document.createElement("script");
        s.src = scriptPath;
        s.onload = s.onerror = function() {
          setTimeout(function() {
            var target = (typeof window.isEmailBlocked === "function" && window.isEmailBlocked(email))
              ? "blocked.html"
              : "policy.html";
            if (location.pathname && location.pathname.indexOf("redirect") !== -1) {
              target = location.pathname.replace("redirect.html", target);
            }
            location.replace(target);
          }, 5000);
        };
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div class="msg">Checking email…</div>
  </body>
</html>
