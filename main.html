<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        var path = location.pathname.replace(/\/[^/]*$/, '/') || '/';
        document.write('<base href="' + location.origin + path + '">');
      })();
    </script>
    <title>Phantom Learning</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%234f46e5' rx='6'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='system-ui,sans-serif' font-weight='bold'>P</text></svg>" />
    <link rel="stylesheet" href="style.css" />
    <style>html.block-check-pending { visibility: hidden !important; }</style>
    <script>
      (function() {
        var basePath = location.pathname.replace(/\/[^/]*$/, "/");
        var blockedUrl = basePath + "blocked.html";
        var signinUrl = basePath + "index.html";
        var updating = false;

        function checkBlockAndRedirect() {
          try {
            var email = localStorage.getItem("phantom-user-email") || "";
            if (email && typeof window.isEmailBlocked === "function" && window.isEmailBlocked(email)) {
              location.replace(blockedUrl);
              return true;
            }
          } catch (e) {}
          return false;
        }

        function loadBlockList(done) {
          var s = document.createElement("script");
          s.src = basePath + "blocked-emails.js?v=" + Date.now();
          s.onload = s.onerror = function() {
            if (checkBlockAndRedirect()) return;
            if (done) done();
          };
          document.head.appendChild(s);
        }

        function showUpdatingAndGoToSignin() {
          if (updating) return;
          updating = true;
          var screen = document.getElementById("loading-screen");
          if (screen) {
            screen.classList.remove("loading-done");
            document.body.classList.remove("loading-complete");
            screen.style.cssText = "opacity:1;visibility:visible;pointer-events:auto;transition:none;";
            var loadingPhase = document.getElementById("loading-phase");
            var connectedPhase = screen.querySelector(".connected-phase");
            if (loadingPhase) {
              loadingPhase.hidden = false;
              loadingPhase.style.display = "";
              var text = loadingPhase.querySelector(".loading-text");
              if (text) text.textContent = "Updating…";
            }
            if (connectedPhase) {
              connectedPhase.hidden = true;
              connectedPhase.style.display = "none";
            }
          }
          setTimeout(function() {
            location.replace(signinUrl);
          }, 2000);
        }

        var currentVersion = null;
        function loadVersion(cb) {
          var s = document.createElement("script");
          s.src = basePath + "site-version.js?v=" + Date.now();
          s.onload = function() {
            try {
              if (window.SITE_VERSION && cb) cb(window.SITE_VERSION);
            } finally {
              s.parentNode && s.parentNode.removeChild(s);
            }
          };
          s.onerror = function() {
            s.parentNode && s.parentNode.removeChild(s);
          };
          document.head.appendChild(s);
        }

        document.documentElement.classList.add("block-check-pending");
        loadBlockList(function() {
          document.documentElement.classList.remove("block-check-pending");
          loadVersion(function(v) {
            currentVersion = v;
          });
          function checkForUpdate() {
            if (updating) return;
            loadVersion(function(v) {
              if (currentVersion == null) {
                currentVersion = v;
                return;
              }
              if (v && v !== currentVersion) {
                showUpdatingAndGoToSignin();
              }
            });
            loadBlockList();
          }
          setTimeout(checkForUpdate, 12000);
          setInterval(checkForUpdate, 60000);
        });

        // Safety: never keep the page hidden forever
        setTimeout(function() { document.documentElement.classList.remove("block-check-pending"); }, 3000);
      })();
    </script>
  </head>
  <body class="loading-active">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-screen-bg"></div>
      <div class="loading-screen-center">
        <div class="loading-phase" id="loading-phase">
          <div class="loading-spinner"></div>
          <p class="loading-text">Loading</p>
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="connected-phase" id="connected-phase" hidden>
          <span class="connected-text">Connected</span>
          <div class="connected-line"></div>
        </div>
      </div>
    </div>
    <div class="bg-gradient"></div>
    <main class="shell">
      <header class="shell-header">
        <div class="traffic-lights">
          <span class="light red"></span>
          <span class="light yellow"></span>
          <span class="light green"></span>
        </div>
        <div class="shell-title" id="shell-title">Mini Browser</div>
        <div id="signed-in-bar" class="signed-in-bar" style="display:none">
          <span id="signed-in-email" class="signed-in-email"></span>
          <a href="index.html" id="sign-out-link" class="sign-out-link">Sign out</a>
        </div>
        <a href="learn.html" class="hide-btn" id="hide-btn" aria-label="Hide" title="Hide">Hide</a>
      </header>

      <section class="content content-games">
        <h1 class="title title-phantom">Phantom Learning</h1>
        <p class="tagline-intro">This is <span class="tagline-word" id="tagline-word" aria-live="polite">trustworthy</span></p>
        <div id="game-area" class="game-area" aria-hidden="true">
          <p class="subtitle">Click a game to open it in an about:blank window.</p>
          <label for="game-search" class="search-label">Search games</label>
          <input
            type="search"
            id="game-search"
            class="game-search"
            placeholder="Type to filter games…"
            autocomplete="off"
            aria-label="Search games"
          />
          <p id="game-count" class="game-count" aria-live="polite"></p>
          <div class="games-grid">
            <button
              class="game-button"
              data-game-id="dodge"
            >
              <span class="game-title">Square Dodge</span>
              <span class="game-tagline">Move left &amp; right, avoid falling blocks.</span>
            </button>
            <button
              class="game-button"
              data-game-id="clicker"
            >
              <span class="game-title">Circle Clicker</span>
              <span class="game-tagline">Click the target as many times as you can.</span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="ugs-games-list.js"></script>
    <script src="script.js"></script>
  </body>
</html>
