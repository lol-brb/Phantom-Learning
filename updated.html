<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        var path = location.pathname.replace(/\/[^/]*$/, '/') || '/';
        document.write('<base href="' + location.origin + path + '">');
      })();
    </script>
    <title>Phantom Learning</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%234f46e5' rx='6'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='system-ui,sans-serif' font-weight='bold'>P</text></svg>" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .loading-subtext {
        margin: 0.45rem 0 0;
        font-size: 0.9rem;
        color: rgba(229,231,235,0.8);
      }
    </style>
  </head>
  <body class="loading-active">
    <div class="fx-stage" aria-hidden="true">
      <canvas id="fx-canvas" class="fx-canvas"></canvas>
      <div class="fx-beam"></div>
      <div class="fx-aurora"></div>
      <div class="fx-grid"></div>
      <div class="fx-vignette"></div>
      <div class="fx-noise"></div>
    </div>
    <div class="bg-gradient"></div>
    <div id="loading-screen" class="loading-screen loading-screen-v2">
      <div class="loading-screen-bg"></div>
      <div class="loading-screen-glow loading-screen-glow-a" aria-hidden="true"></div>
      <div class="loading-screen-glow loading-screen-glow-b" aria-hidden="true"></div>
      <div class="loading-screen-noise" aria-hidden="true"></div>
      <div class="loading-screen-center">
        <div class="loading-phase" id="loading-phase">
          <div class="loading-orbit" aria-hidden="true">
            <div class="loading-orbit-core"></div>
            <div class="loading-orbit-ring loading-orbit-ring-1"></div>
            <div class="loading-orbit-ring loading-orbit-ring-2"></div>
          </div>
          <p class="loading-kicker">Phantom</p>
          <p class="loading-headline updating-loading-headline">Applying updates</p>
          <div class="loading-progress-track">
            <div class="loading-progress-fill"></div>
          </div>
          <p class="loading-subtext">Please wait — refreshing materials…</p>
        </div>
        <div class="connected-phase" id="connected-phase" hidden>
          <div class="connected-check" aria-hidden="true">
            <svg class="connected-check-svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
              <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2" class="connected-check-ring" />
              <path class="connected-check-mark" d="M14 24l8 8 12-16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <span class="connected-text">Ready</span>
          <div class="connected-line"></div>
        </div>
      </div>
    </div>

    <script>
      (function() {
        var basePath = location.pathname.replace(/\/[^/]*$/, "/");
        var signinUrl = basePath + "index.html";
        setTimeout(function() {
          location.replace(signinUrl);
        }, 3200);
      })();
    </script>
    <script src="site-fx.js"></script>
  </body>
</html>
